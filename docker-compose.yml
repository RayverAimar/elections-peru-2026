services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: peru_elecciones
      POSTGRES_USER: peru
      POSTGRES_PASSWORD: peru2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peru -d peru_elecciones"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
